<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu personagem</title>

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <img src="./assets/nosso-personagem.png" alt="Imagem do personagem" />
        <h1>Arkon, o Guerreiro</h1>
        <p class="descricao">
          Um guerreiro lendário das montanhas do norte, conhecido por sua força
          e honra.
        </p>
        <div class="habilidades">
          <h2>Habilidades</h2>
          <ul>
            <li>Força extrema</li>
            <li>Resistência</li>
            <li>Espada lendária</li>
          </ul>
        </div>
        <div class="caracteristicas">
          <h2>Características</h2>
          <p><strong>Classe:</strong> Guerreiro</p>
          <p><strong>Nível:</strong> 45</p>
          <p><strong>Elemento:</strong> Terra</p>
        </div>
      </section>
    </main>
  </body>
</html>
